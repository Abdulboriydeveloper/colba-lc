<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colba</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue: #1e90ff; }
    html, body { height: 100%; font-family: 'Inter', sans-serif; }

    .page {
      max-height: 100vh;
      display: flex; flex-direction: column;
      background: linear-gradient(135deg, #0d3b51 0%, #1689bf 50%, #1299d5 100%);
      color: #fff; overflow: hidden;
    }

    /* NAVBAR */
    .navbar {
      position: relative; z-index: 10;
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 20px; padding: 20px 40px 40px;
      max-width: 1280px; width: 100%; margin: 0 auto;
    }
    .nav-logo { width: 176px; display: flex; align-items: center; gap: 13px; text-decoration: none; flex-shrink: 0; }
    .logo-img { width: 100%; }
    .nav-lang {
      display: flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 30px; padding: 9px 16px; cursor: pointer;
      font-size: 13px; font-weight: 600; transition: background .2s;
      position: relative; user-select: none; z-index: 200;
    }
    .nav-lang:hover { background: rgba(255,255,255,0.12); }
    .nav-lang .flag { font-size: 18px; }
    .nav-lang .chevron { font-size: 10px; color: rgba(255,255,255,0.55); margin-left: 2px; }
    .lang-dd {
      position: absolute; top: calc(100% + 8px); right: 0;
      background: #131f3a; border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px; overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.55);
      z-index: 300; min-width: 145px; display: none;
    }
    .lang-dd.open { display: block; }
    .dd-item { padding: 11px 18px; font-size: 13px; font-weight: 500; transition: background .15s; white-space: nowrap; cursor: pointer; color: #fff; }
    .dd-item:hover { background: rgba(255,255,255,0.08); }

    /* MAIN */
    .main {
      flex: 1; position: relative; z-index: 10;
      display: flex; align-items: flex-start; gap: 20px;
      padding: 0 40px 40px; max-width: 1280px; width: 100%; margin: 40px auto;
    }

    /* LEFT */
    .left { flex: 1; display: flex; flex-direction: column; gap: 80px; }
    .hero-title { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: clamp(34px, 4.2vw, 50px); line-height: 1.1; color: #fff; }

    /* SLIDER */
    .slider-outer { display: flex; flex-direction: column; gap: 14px; }
    .slide-card {
      width: 620px; height: 350px; border-radius: 22px; overflow: hidden;
      position: relative; box-shadow: 0 8px 40px rgba(0,0,0,0.35);
      flex-shrink: 0; display: grid; grid-template-columns: 1fr 1fr;
    }
    .slide-card.slide-enter     { animation: sEnter .38s cubic-bezier(.22,1,.36,1) both; }
    .slide-card.slide-exit-next { animation: sExitL .38s cubic-bezier(.22,1,.36,1) both; }
    .slide-card.slide-exit-prev { animation: sExitR .38s cubic-bezier(.22,1,.36,1) both; }
    @keyframes sEnter { from{opacity:0;transform:scale(.95) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
    @keyframes sExitL { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(-20px) scale(.96)} }
    @keyframes sExitR { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(20px) scale(.96)} }

    .sc-photo { position: relative; overflow: hidden; min-height: 280px; }
    .sc-photo img { width: 100%; height: 100%; object-fit: cover; object-position: top center; display: block; }
    .sc-photo-placeholder { width: 100%; height: 100%; min-height: 280px; display: flex; align-items: flex-end; justify-content: center; background: rgba(0,0,0,0.1); }
    .sc-body { display: flex; flex-direction: column; justify-content: center; padding: 28px 24px 36px 20px; gap: 14px; position: relative; }
    .sc-body::before { content:''; position:absolute; top:-30px; right:-30px; width:120px; height:120px; border:3px solid rgba(255,255,255,0.15); border-radius:50%; pointer-events:none; }
    .sc-body::after  { content:''; position:absolute; bottom:10px; right:10px; width:60px; height:60px; border:2px solid rgba(255,255,255,0.12); border-radius:50%; pointer-events:none; }
    .sc-tag { display:none; background:rgba(255,255,255,0.22); border-radius:30px; padding:4px 14px; font-size:10px; font-weight:800; letter-spacing:1.5px; color:#fff; text-transform:uppercase; width:fit-content; }
    .sc-title { font-family:'Montserrat',sans-serif; font-weight:900; font-size:clamp(18px,2.2vw,26px); line-height:1.15; color:#fff; text-transform:uppercase; }
    .sc-desc { font-size:12px; color:rgba(255,255,255,0.85); line-height:1.65; }
    .sc-deco { position:absolute; top:0; right:0; bottom:0; left:0; pointer-events:none; overflow:hidden; border-radius:22px; }
    .sc-deco span { position:absolute; display:block; background:rgba(255,255,255,0.06); transform-origin:center; }
    .sc-deco span:nth-child(1) { width:3px; height:200%; top:-50%; right:42%; transform:rotate(20deg); }
    .sc-deco span:nth-child(2) { width:2px; height:200%; top:-50%; right:38%; transform:rotate(20deg); }

    .sdots { display:flex; gap:7px; }
    .sdot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.28); cursor:pointer; transition:width .3s cubic-bezier(.34,1.56,.64,1), background .3s, border-radius .3s; }
    .sdot.active { width:26px; border-radius:4px; background:var(--c,#fff); }

    /* ARROW */
    .arrow-wrap { flex-shrink:0; opacity:0.85; }

    /* FORM CARD */
    .right { flex-shrink:0; width:476px; }
    .form-card {
      width:476px; height: 600px; background:#fff; border-radius:24px;
      border:2px solid #5aabff;
      box-shadow:0 0 0 1px rgba(30,144,255,0.07), 0 24px 60px rgba(0,0,0,0.45);
      padding:36px 36px 32px;
      display:flex; flex-direction:column;
    }
    .fc-header { text-align:center; margin-bottom:8px; width: auto; height: 115px; }
    .fc-title {
      font-family:'Montserrat',sans-serif; font-weight:800; font-size:38px;
      background:linear-gradient(135deg,#0d3b51 0%,#1689bf 50%,#1299d5 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      line-height:1.2; margin-bottom:10px;
    }
    .fc-sub { font-size:13px; color:#94a3b8; font-style:italic; }

    /* FIELDS */
    .fc-fields { display:flex; flex-direction:column; margin:16px 0 18px; gap: 5px; }

    .fi { border-bottom:1.5px solid #e2e8f0; padding:16px 4px; position:relative; transition:border-color .2s; }
    .fi:focus-within { border-color:var(--blue); }
    .fi.fi-err { border-color:#f87171 !important; }
    .fi input { width:100%; border:none; outline:none; font-family:'Inter',sans-serif; font-size:16px; color:#1a1a2e; background:transparent; }
    .fi input::placeholder { color:#94a3b8; }
    .fi input:disabled { opacity:0.6; cursor:not-allowed; }

    .fs-wrap {
      position: relative;
      border-bottom: 1.5px solid #e2e8f0;
      transition: border-color .2s;
    }
    .fs-wrap.open   { border-color: var(--blue); }
    .fs-wrap.fs-err { border-color: #f87171 !important; }

    .fs-trigger {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 4px;
      cursor: pointer; user-select: none;
      font-family: 'Inter', sans-serif; font-size: 16px; color: #94a3b8;
    }
    .fs-trigger.has-value { color: #1a1a2e; }

    .fs-arrow {
      font-size: 11px; color: #94a3b8; flex-shrink: 0;
      transition: transform .22s cubic-bezier(.22,1,.36,1);
    }
    .fs-wrap.open .fs-arrow { transform: rotate(180deg); }

    .fs-dropdown {
      position: absolute; left: -4px; right: -4px;
      top: calc(100% + 2px);
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 14px;
      box-shadow: 0 10px 36px rgba(0,0,0,0.13);
      z-index: 500;
      overflow: hidden;
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      transition: opacity .2s, transform .22s cubic-bezier(.22,1,.36,1);
    }
    .fs-wrap.open .fs-dropdown {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .fs-option {
      padding: 13px 16px;
      font-size: 15px; color: #1a1a2e;
      cursor: pointer; transition: background .15s;
    }
    .fs-option:hover  { background: #f0f7ff; }
    .fs-option.active { background: #e8f4ff; color: #1689bf; font-weight: 600; }

    .filial-row { display: none; }
    .filial-row.visible {
      display: block;
      animation: fadeDown .28s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-6px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* SUBMIT */
    .fc-btn {
      width:100%; height:58px;
      background:linear-gradient(135deg,#0d3b51 0%,#1689bf 50%,#1299d5 100%);
      color:#fff; border:none; cursor:pointer; border-radius:16px;
      font-family:'Montserrat',sans-serif; font-weight:800; font-size:17px;
      transition:filter .15s, transform .15s, box-shadow .15s;
      display:flex; align-items:center; justify-content:center; gap:10px;
      margin-top:auto; flex-shrink:0;
    }
    .fc-btn:hover { filter:brightness(1.1); transform:translateY(-2px); box-shadow:0 12px 32px rgba(30,144,255,0.45); }
    .fc-btn:active { transform:translateY(0); }
    .fc-btn:disabled { opacity:0.75; cursor:not-allowed; transform:none; box-shadow:none; filter:none; }

    .fc-error { font-size:13px; color:#ef4444; text-align:center; padding:6px 4px 0; line-height:1.5; display:none; }

    .fc-spinner { display:inline-block; width:18px; height:18px; border:2.5px solid rgba(255,255,255,0.35); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* SUCCESS */
    .fc-success { display:flex; flex-direction:column; align-items:center; gap:14px; text-align:center; animation:popIn .35s cubic-bezier(.34,1.56,.64,1); padding:40px 0; }
    @keyframes popIn { from{opacity:0;transform:scale(.88)} to{opacity:1;transform:scale(1)} }
    .fc-check { width:68px; height:68px; border-radius:50%; background:#22c55e; display:flex; align-items:center; justify-content:center; font-size:30px; color:#fff; }
    .fc-success h3 { font-family:'Montserrat',sans-serif; font-weight:800; font-size:22px; color:#0b1a3e; }
    .fc-success p  { font-size:14px; color:#64748b; }
    .fc-reset { background:transparent; border:1.5px solid #e2e8f0; border-radius:10px; padding:9px 24px; font-size:13px; cursor:pointer; color:#64748b; transition:border-color .2s; }
    .fc-reset:hover { border-color:#0b1a3e; color:#0b1a3e; }

    /* RESPONSIVE */
    @media (max-width:1200px) { .arrow-wrap{display:none;} .main{gap:28px;} }
    @media (max-width:1024px) {
      .navbar{padding:20px 24px;}
      .main{padding:0 24px 32px; gap:24px;}
      .right{width:400px;} .form-card{width:100%;} .fc-title{font-size:28px;}
    }
    @media (max-width:860px) {
      html,body{height:auto;} .page{min-height:100svh; overflow:auto;}
      .navbar{padding:16px 20px;} .nav-logo{width:140px;}
      .main{flex-direction:column; align-items:stretch; padding:0 20px 40px; margin-top:12px; gap:28px;}
      .left{gap:22px;} .hero-title{font-size:clamp(26px,7vw,40px);}
      .slide-card{width:100%; height: 300px;}
      .right{width:100%;} .form-card{width:100%;} .fc-title{font-size:26px;} .fc-btn{height:54px; font-size:15px;}
    }
    @media (max-width:480px) {
      .navbar{padding:14px 16px;} .nav-logo{width:120px;}
      .main{padding:0 16px; gap:22px; z-index:9; margin:50px auto;}
      .hero-title{font-size:clamp(22px,8vw,34px);}
      .slide-card{height: 300px !important;}
      .form-card{padding:24px 18px 22px; border-radius:20px;  height: 420px;} .fc-title{font-size:22px;}
      .fi input,.fs-trigger{font-size:15px;} .fc-btn{height:52px; font-size:14px; border-radius:14px;}
    }
  </style>
</head>

<script>
/* ── CONFIG ── */
const BITRIX_WEBHOOK = 'https://YOUR_DOMAIN.bitrix24.ru/rest/1/YOUR_TOKEN'
const LEAD_SOURCE    = 'WEB'

async function sendToBitrix({ name, phone, city, filial, lang }) {
  const url  = `${BITRIX_WEBHOOK}/crm.lead.add.json`
  const body = new FormData()
  body.append('fields[TITLE]',                `Colba — ${name}`)
  body.append('fields[NAME]',                 name)
  body.append('fields[PHONE][0][VALUE]',      phone)
  body.append('fields[PHONE][0][VALUE_TYPE]', 'WORK')
  body.append('fields[SOURCE_ID]',            LEAD_SOURCE)
  body.append('fields[COMMENTS]',
    `Til: ${lang==='uz'?"O'zbek":'Rus'} | Shahar: ${city}${filial?' | Filial: '+filial:''} | Sayt: Colba lid forma`)
  body.append('fields[STATUS_ID]', 'NEW')
  const res = await fetch(url, { method:'POST', body })
  if (!res.ok) throw new Error(`Bitrix ${res.status}`)
  return res.json()
}

  ],
  ru: [
    { id:1, tag:'ПРЕПОДАВАТЕЛИ', color:'#22c55e', bg:'linear-gradient(135deg,#065f46,#10b981)', e:'👩‍🏫', title:"УЧИТЕЛЯ",    desc:"Каждый преподаватель прошёл специальные курсы повышения квалификации и имеет до 10 лет опыта работы. Мы ни за что не променяем таких преподавателей ни на что другое." },
    { id:2, tag:'РЕЗУЛЬТАТ',     color:'#3b82f6', bg:'linear-gradient(135deg,#1e3a8a,#3b82f6)', e:'🏆', title:"100% РЕЗУЛЬТАТ",   desc:"Студенты, завершившие образовательную программу Colba, поступят в медицинские вузы раньше запланированного срока." },
    { id:3, tag:'ПОДДЕРЖКА',     color:'#f97316', bg:'linear-gradient(135deg,#7c2d12,#f97316)', e:'🤝', title:"БЕСПЛАТНЫЙ ПОМОЩНИК УЧИТЕЛЯ",      desc:"Для студентов, испытывающих трудности с освоением какой-либо темы, всегда есть возможность обратиться к репетиторам, которые помогут им повторно объяснить тему и полностью ее понять." },
    { id:4, tag:'ИНТЕНСИВ',      color:'#ef4444', bg:'linear-gradient(135deg,#7f1d1d,#ef4444)', e:'📅', title:"ЕЖЕДНЕВНЫЕ УРОКИ",         desc:"Мы поможем вам поступить в медицинские вузы, проводя занятия по 4-5 часов в день, 5 дней в неделю." },
    { id:5, tag:'КОНТРОЛЬ',      color:'#f59e0b', bg:'linear-gradient(135deg,#78350f,#f59e0b)', e:'📝', title:"ЕЖЕДНЕВНЫЙ ЭКЗАМЕН",          desc:"Для постоянного контроля за усвоением предмета учащимися введена система ежедневных экзаменов." },
    { id:6, tag:'БОНУС',         color:'#06b6d4', bg:'linear-gradient(135deg,#164e63,#06b6d4)', e:'🎁', title:"БЕСПЛАТНЫЕ ОБЯЗАТЕЛЬНЫЕ ПРЕДМЕТЫ",      desc:"Родной язык, история и математика преподаются ученикам школы Кольба совершенно бесплатно." },
  ],
}

const FLAGS = { uz:'🇺🇿', ru:'🇷🇺' }

/* ── STATE ── */
let lang = 'uz', current = 0, animating = false, timer = null, sending = false
let selCity = '', selFilial = ''

/* ── DOM REFS ── */
const g = id => document.getElementById(id)
const heroTitle    = g('heroTitle'),   slideCard     = g('slideCard'),    scPhoto        = g('scPhoto')
const scTag        = g('scTag'),       scTitle       = g('scTitle'),      scDesc         = g('scDesc'),     sdots = g('sdots')
const fcTitle      = g('fcTitle'),     fcSub         = g('fcSub')
const nameInput    = g('nameInput'),   phoneInput    = g('phoneInput')
const fiName       = g('fiName'),      fiPhone       = g('fiPhone')
const cityWrap     = g('cityWrap'),    cityTrigger   = g('cityTrigger'),  cityLabelEl    = g('cityLabel'),   cityDropdown  = g('cityDropdown')
const filialRow    = g('filialRow'),   filialWrap    = g('filialWrap'),   filialTrigger  = g('filialTrigger'), filialLabelEl = g('filialLabel'), filialDropdown = g('filialDropdown')
const submitBtn    = g('submitBtn'),   netError      = g('netError'),     formView       = g('formView'),    successView   = g('successView')
const successTitle = g('successTitle'), successMsg   = g('successMsg'),   resetBtn       = g('resetBtn')
const langBtn      = g('langBtn'),     langDd        = g('langDd'),       flagIcon       = g('flagIcon'),    langLabel     = g('langLabel')

/* ── DROPDOWN HELPERS ── */
function buildDropdown(dropdownEl, options, activeVal, onPick) {
  dropdownEl.innerHTML = ''
  options.forEach(opt => {
    const div = document.createElement('div')
    div.className = 'fs-option' + (opt.v === activeVal ? ' active' : '')
    div.textContent = opt.l
    div.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); onPick(opt) })
    dropdownEl.appendChild(div)
  })
}

function closeAllSelects() {
  cityWrap.classList.remove('open')
  filialWrap.classList.remove('open')
  langDd.classList.remove('open')
}

/* ── CITY SELECT ── */
cityTrigger.addEventListener('click', e => {
  e.stopPropagation()
  cityWrap.classList.contains('open') ? closeAllSelects() : (closeAllSelects(), cityWrap.classList.add('open'))
})

function onCityPick(opt) {
  selCity = opt.v
  selFilial = ''
  cityLabelEl.textContent = opt.l
  cityTrigger.classList.add('has-value')
  cityWrap.classList.remove('open', 'fs-err')
  buildDropdown(cityDropdown, T[lang].cities, selCity, onCityPick)

  if (selCity === 'toshkent') {
    filialLabelEl.textContent = T[lang].filialPh
    filialTrigger.classList.remove('has-value')
    filialWrap.classList.remove('fs-err')
    buildDropdown(filialDropdown, T[lang].filials, '', onFilialPick)
    filialRow.classList.remove('visible')
    void filialRow.offsetWidth
    filialRow.classList.add('visible')
  } else {
    filialRow.classList.remove('visible')
    filialWrap.classList.remove('fs-err')
    selFilial = ''
  }
}

/* ── FILIAL SELECT ── */
filialTrigger.addEventListener('click', e => {
  e.stopPropagation()
  filialWrap.classList.contains('open') ? closeAllSelects() : (closeAllSelects(), filialWrap.classList.add('open'))
})

function onFilialPick(opt) {
  selFilial = opt.v
  filialLabelEl.textContent = opt.l
  filialTrigger.classList.add('has-value')
  filialWrap.classList.remove('open', 'fs-err')
  buildDropdown(filialDropdown, T[lang].filials, selFilial, onFilialPick)
}

/* ══════════════════════════════════════════════
   RENDER — ikki alohida funksiya

   renderSlider() — FAQAT chap tomondagi slider.
   Forma holati (selCity, selFilial, inputlar)
   ga UMUMAN tegmaydi.

   renderForm() — FAQAT statik forma matnlari
   (title, placeholder, dropdown options).
   Tanlangan qiymatlarni saqlab qoladi.

   renderAll() — ikkalasini birga chaqiradi;
   faqat til o'zgansa yoki to'liq reset kerak
   bo'lganda ishlatiladi.
══════════════════════════════════════════════ */
function renderSlider() {
  const slides = SLIDES[lang]
  const slide  = slides[current]
  const t      = T[lang]

  // Hero title
  heroTitle.innerHTML = t.heroTitle.map(l => `<span>${l}<br/></span>`).join('')

  // Slide card
  slideCard.style.background = slide.bg
  scPhoto.innerHTML = ''
  const ph = document.createElement('div')
  ph.className = 'sc-photo-placeholder'
  ph.style.cssText = 'font-size:88px; align-items:flex-end'
  ph.textContent = slide.e
  scPhoto.appendChild(ph)
  scTag.textContent  = slide.tag
  scTitle.innerHTML  = slide.title.replace(/\n/g, '<br/>')
  scDesc.textContent = slide.desc

  // Dots
  sdots.innerHTML = ''
  slides.forEach((s, i) => {
    const d = document.createElement('span')
    d.className = 'sdot' + (i === current ? ' active' : '')
    d.style.setProperty('--c', s.color)
    d.addEventListener('click', e => {
      e.stopPropagation()
      goTo(i, i > current ? 'next' : 'prev')
      resetTimer()
    })
    sdots.appendChild(d)
  })
}

function renderForm() {
  const t = T[lang]

  // Statik matnlar
  fcTitle.textContent   = t.formTitle
  fcSub.textContent     = t.formSub
  submitBtn.textContent = t.btnText
  resetBtn.textContent  = t.back
  flagIcon.textContent  = FLAGS[lang]
  langLabel.textContent = t.langLbl
  nameInput.placeholder  = t.namePh
  phoneInput.placeholder = t.phonePh

  // City: agar tanlanmagan bo'lsa placeholder ko'rsat
  if (!selCity) {
    cityLabelEl.textContent = t.cityPh
    cityTrigger.classList.remove('has-value')
  }
  // Filial: agar tanlanmagan bo'lsa placeholder ko'rsat
  if (!selFilial) {
    filialLabelEl.textContent = t.filialPh
    filialTrigger.classList.remove('has-value')
  }

  // Dropdown options yangilanadi — tanlangan qiymat (active class) saqlanadi
  buildDropdown(cityDropdown,   t.cities,  selCity,   onCityPick)
  buildDropdown(filialDropdown, t.filials, selFilial, onFilialPick)
}

function resetFormState() {
  selCity = ''; selFilial = ''
  nameInput.value  = ''
  phoneInput.value = ''
  netError.style.display = 'none'
  fiName.classList.remove('fi-err')
  fiPhone.classList.remove('fi-err')
  cityWrap.classList.remove('fs-err')
  filialWrap.classList.remove('fs-err')
  filialRow.classList.remove('visible')
  cityTrigger.classList.remove('has-value')
  filialTrigger.classList.remove('has-value')
}

function renderAll() {
  renderSlider()
  renderForm()
}

/* ── SLIDER ── */
function goTo(idx, dir) {
  if (animating) return
  animating = true
  slideCard.className = 'slide-card ' + (dir === 'next' ? 'slide-exit-next' : 'slide-exit-prev')
  setTimeout(() => {
    current = idx
    renderSlider()   // ← Faqat slider! Forma tegmasdan qoladi.
    slideCard.className = 'slide-card slide-enter'
    animating = false
  }, 380)
}

function next() { goTo((current + 1) % SLIDES[lang].length, 'next') }
function resetTimer() { clearInterval(timer); timer = setInterval(next, 4800) }

/* ── GLOBAL CLICK ── */
document.addEventListener('click', closeAllSelects)

/* ── LANG SWITCHER ── */
langBtn.addEventListener('click', e => { e.stopPropagation(); langDd.classList.toggle('open') })

document.querySelectorAll('.dd-item').forEach(item => {
  item.addEventListener('click', e => {
    e.stopPropagation()
    lang = item.dataset.lang
    current = 0
    formView.style.display    = ''
    successView.style.display = 'none'
    resetFormState()
    renderAll()
    langDd.classList.remove('open')
  })
})

/* ── INPUT EVENTS ── */
nameInput.addEventListener('input',  () => fiName.classList.remove('fi-err'))
phoneInput.addEventListener('input', () => fiPhone.classList.remove('fi-err'))

/* ── SUBMIT ── */
submitBtn.addEventListener('click', async () => {
  if (sending) return
  const t     = T[lang]
  const name  = nameInput.value.trim()
  const phone = phoneInput.value.trim()
  let hasErr  = false

  if (!name)  { fiName.classList.add('fi-err');  hasErr = true } else fiName.classList.remove('fi-err')
  if (!phone || phone.replace(/\D/g,'').length < 7) { fiPhone.classList.add('fi-err'); hasErr = true } else fiPhone.classList.remove('fi-err')
  if (!selCity) { cityWrap.classList.add('fs-err'); hasErr = true } else cityWrap.classList.remove('fs-err')
  if (selCity === 'toshkent' && !selFilial) { filialWrap.classList.add('fs-err'); hasErr = true } else filialWrap.classList.remove('fs-err')
  if (hasErr) return

  sending = true
  netError.style.display = 'none'
  submitBtn.disabled = true
  submitBtn.innerHTML = `<span class="fc-spinner"></span> ${t.btnWait}`

  try {
    const cityLabel   = t.cities.find(c => c.v === selCity)?.l || selCity
    const filialLabel = selFilial ? (t.filials.find(f => f.v === selFilial)?.l || selFilial) : ''
    await sendToBitrix({ name, phone, city: cityLabel, filial: filialLabel, lang })
    formView.style.display    = 'none'
    successView.style.display = ''
    successTitle.textContent  = `${t.okTitle}, ${name}!`
    successMsg.textContent    = t.okMsg
  } catch(err) {
    netError.textContent   = t.errNet
    netError.style.display = ''
  } finally {
    sending = false
    submitBtn.disabled    = false
    submitBtn.textContent = T[lang].btnText
  }
})

/* ── RESET ── */
resetBtn.addEventListener('click', () => {
  formView.style.display    = ''
  successView.style.display = 'none'
  resetFormState()
  renderAll()
})

/* ── INIT ── */
renderAll()
timer = setInterval(next, 4800)
</script>
</body>
</html>
